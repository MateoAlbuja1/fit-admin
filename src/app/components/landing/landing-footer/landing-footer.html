<footer class="landing-footer">
  <div class="footer-grid">
    <section>
      <span class="footer-mark"><img src="/assets/img/wx-fitness-gym-logo.png" [alt]="gymName" /></span>
      <h2>{{ gymName }}</h2>
      <p>{{ gymSummary }}</p>
    </section>

    <section>
      <h3>Servicios</h3>
      <button type="button" (click)="navigate.emit('servicios')">Musculacion</button>
      <button type="button" (click)="navigate.emit('servicios')">Cardio</button>
      <button type="button" (click)="navigate.emit('servicios')">Entrenamiento personalizado</button>
      <button type="button" (click)="navigate.emit('servicios')">Clases grupales</button>
      <button type="button" (click)="navigate.emit('servicios')">Evaluacion fisica</button>
      <button type="button" (click)="navigate.emit('tienda')">Tienda fitness</button>
    </section>

    <section>
      <h3>Contacto</h3>
      <p>Telefono: {{ phone }}</p>
      <p>{{ openingHours }}</p>
      <p>Email: {{ email }}</p>
    </section>

    <section>
      <h3>Redes sociales</h3>
      <a href="https://www.facebook.com/" target="_blank" rel="noreferrer">Facebook</a>
      <a href="https://www.instagram.com/" target="_blank" rel="noreferrer">Instagram</a>
      <a href="https://www.tiktok.com/" target="_blank" rel="noreferrer">TikTok</a>
      <a [href]="whatsappUrl" target="_blank" rel="noreferrer">WhatsApp</a>
    </section>
  </div>

  <div class="copyright">
    <span>&copy; 2026 {{ gymName }}. Todos los derechos reservados.</span>
  </div>
</footer>

<article class="service-card">
  <img [src]="service.image" [alt]="service.name" />
  <div class="service-body">
    <span>{{ service.badge }}</span>
    <h3>{{ service.name }}</h3>
    <p>{{ service.description }}</p>
    <button type="button" (click)="viewMore.emit(service)">Ver mas</button>
  </div>
</article>

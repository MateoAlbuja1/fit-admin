<article class="membership-card" [class.is-featured]="plan.featured">
  @if (plan.featured) {
    <span class="featured-label">Mas elegido</span>
  }
  <h3>{{ plan.name }}</h3>
  <strong>{{ plan.price }}</strong>
  <small>{{ plan.duration }}</small>
  <span class="best-for">{{ plan.bestFor }}</span>
  <p>{{ plan.description }}</p>
  <ul>
    @for (benefit of plan.benefits; track benefit) {
      <li>{{ benefit }}</li>
    }
  </ul>
  <div class="plan-actions">
    <button type="button" (click)="choose.emit(plan)">Elegir plan</button>
    <button class="whatsapp-plan" type="button" (click)="whatsapp.emit(plan)">WhatsApp</button>
  </div>
</article>

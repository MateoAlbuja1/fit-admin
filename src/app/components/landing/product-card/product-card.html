<article class="product-card" [class.has-facts]="product.factsImage">
  <div class="product-image" [class.is-contained]="product.imageFit === 'contain'">
    <img class="product-main" [src]="product.image" [alt]="product.name" />
    @if (product.factsImage) {
      <img class="facts-image" [src]="product.factsImage" [alt]="product.factsAlt || 'Tabla nutricional de ' + product.name" />
      <div class="facts-cue">
        <strong>Tabla nutricional</strong>
      </div>
    }
    @if (product.discount) {
      <span>{{ product.discount }}</span>
    }
    @if (!product.factsImage) {
      <div class="product-hover">
        <strong>Descripcion rapida</strong>
        <p>{{ product.description }}</p>
      </div>
    }
  </div>

  <div class="product-body">
    <small>{{ product.category }}</small>
    <h3>{{ product.name }}</h3>
    <div class="meta">
      <strong>{{ product.price }}</strong>
      <span>{{ product.rating }}</span>
    </div>
    <div class="actions">
      <button class="add" type="button" (click)="add.emit(product)">Agregar al carrito</button>
    </div>
  </div>
</article>
